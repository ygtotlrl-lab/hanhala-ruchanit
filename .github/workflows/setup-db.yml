name: Setup ys_users Table
on:
  workflow_dispatch:
    inputs:
      service_key:
        description: 'Supabase Service Role Key'
        required: true
        type: string

jobs:
  create-table:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: Run SQL
        run: |
          curl -s -X POST \
            "https://kxbtskqobynewvnckaaz.supabase.co/rest/v1/rpc/query" \
            -H "apikey: ${{ github.event.inputs.service_key }}" \
            -H "Authorization: Bearer ${{ github.event.inputs.service_key }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "create table if not exists ys_users (id bigint generated always as identity primary key, username text unique not null, password_hash text not null, full_name text not null, role text not null, active boolean default true, created_at timestamptz default now()); alter table ys_users enable row level security; create policy allow_all on ys_users using (true) with check (true);"
            }' || echo "rpc/query not available"

          # נסה דרך psql עם connection string
          echo "Trying direct connection..."
          curl -s -X POST \
            "https://kxbtskqobynewvnckaaz.supabase.co/rest/v1/ys_users" \
            -H "apikey: ${{ github.event.inputs.service_key }}" \
            -H "Authorization: Bearer ${{ github.event.inputs.service_key }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"username":"admin","password_hash":"h3j0m76e","full_name":"מנהל ראשי","role":"admin","active":true}'
